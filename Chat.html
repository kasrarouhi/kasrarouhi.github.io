<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Tools Hub</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #080e1a;
      color: #fff;
      margin: 0;
      padding: 0;
      text-align: center;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0, 100, 255, 0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(120, 0, 255, 0.15) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(0, 200, 255, 0.08) 0%, transparent 70%);
      z-index: 0;
      animation: bgShift 12s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0.85; transform: scale(1.05); }
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.25;
      z-index: 0;
      animation: float linear infinite;
    }
    .orb1 { width: 400px; height: 400px; background: #0072ff; top: -100px; left: -100px; animation-duration: 20s; }
    .orb2 { width: 300px; height: 300px; background: #7b2fff; bottom: -80px; right: -80px; animation-duration: 25s; animation-direction: reverse; }
    .orb3 { width: 200px; height: 200px; background: #00c6ff; top: 50%; left: 60%; animation-duration: 18s; }

    @keyframes float {
      0%   { transform: translate(0, 0) rotate(0deg); }
      33%  { transform: translate(40px, -30px) rotate(120deg); }
      66%  { transform: translate(-20px, 20px) rotate(240deg); }
      100% { transform: translate(0, 0) rotate(360deg); }
    }

    header {
      position: relative;
      z-index: 1;
      padding: 68px 20px 61px;
      background:
        linear-gradient(to bottom, rgba(8,14,26,0.45) 0%, rgba(8,14,26,0.75) 100%),
        url('https://images.unsplash.com/photo-1462331940025-496dfbfc7564?w=1920&q=85') center center / cover no-repeat;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      overflow: hidden;
    }

    .header-badge {
      display: inline-block;
      background: linear-gradient(135deg, rgba(0,198,255,0.15), rgba(0,114,255,0.15));
      border: 1px solid rgba(0,198,255,0.3);
      border-radius: 999px;
      padding: 5px 18px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #00c6ff;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(100deg, #00c6ff 0%, #a78bfa 50%, #0072ff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradientShift 4s linear infinite;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 1rem;
      margin: 0;
      font-weight: 400;
    }

    .grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      padding: 48px 40px;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 30px 20px 23px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: transform 0.35s cubic-bezier(.22,.68,0,1.2), box-shadow 0.35s ease, border-color 0.35s ease;
      overflow: hidden;
      backdrop-filter: blur(8px);
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    /* Staggered entrance */
    .card:nth-child(1)  { animation-delay: 0.05s; }
    .card:nth-child(2)  { animation-delay: 0.10s; }
    .card:nth-child(3)  { animation-delay: 0.15s; }
    .card:nth-child(4)  { animation-delay: 0.20s; }
    .card:nth-child(5)  { animation-delay: 0.25s; }
    .card:nth-child(6)  { animation-delay: 0.30s; }
    .card:nth-child(7)  { animation-delay: 0.35s; }
    .card:nth-child(8)  { animation-delay: 0.40s; }
    .card:nth-child(9)  { animation-delay: 0.45s; }
    .card:nth-child(10) { animation-delay: 0.50s; }
    .card:nth-child(11) { animation-delay: 0.55s; }
    .card:nth-child(12) { animation-delay: 0.60s; }
    .card:nth-child(13) { animation-delay: 0.65s; }
    .card:nth-child(14) { animation-delay: 0.70s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Shimmer sweep on hover */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.07) 50%, transparent 100%);
      transition: left 0.5s ease;
      pointer-events: none;
    }

    .card:hover::before {
      left: 160%;
    }

    /* Gradient border glow on hover */
    .card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      background: linear-gradient(135deg, #00c6ff, #7b2fff, #0072ff);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .card:hover::after {
      opacity: 1;
    }

    .card:hover {
      transform: translateY(-12px) scale(1.04);
      box-shadow: 0 24px 50px rgba(0, 114, 255, 0.3), 0 0 0 1px rgba(0,198,255,0.2);
      border-color: transparent;
    }

    .card a {
      text-decoration: none;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card a img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin-bottom: 16px;
      border: 2px solid rgba(0, 198, 255, 0.5);
      box-shadow: 0 0 0 4px rgba(0, 198, 255, 0.08), 0 0 20px rgba(0, 198, 255, 0.35);
      object-fit: cover;
      transition: box-shadow 0.35s ease, transform 0.35s ease;
    }

    .card:hover a img {
      box-shadow: 0 0 0 5px rgba(0,198,255,0.2), 0 0 35px rgba(0,198,255,0.6);
      transform: scale(1.1);
    }

    .card a img.gptzero-logo {
      border-radius: 14px;
      background: white;
      width: 72px;
      height: 72px;
      object-fit: contain;
      padding: 4px;
    }

    .card a span {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      transition: color 0.2s;
    }

    .card:hover a span {
      color: #00c6ff;
    }

    @media (max-width: 1200px) {
      .grid { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 900px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: repeat(2, 1fr); padding: 24px; }
      h1 { font-size: 2rem; }
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ── Light card row ── */
    .grid-light {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      padding: 0 40px 48px;
    }

    .card-light {
      position: relative;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 24px;
      padding: 30px 20px 23px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      transition: transform 0.35s cubic-bezier(.22,.68,0,1.2), box-shadow 0.35s ease, border-color 0.35s ease;
      overflow: hidden;
      backdrop-filter: blur(8px);
      opacity: 0;
      animation: fadeUp 0.5s ease forwards;
    }

    .card-light:nth-child(1) { animation-delay: 0.05s; }
    .card-light:nth-child(2) { animation-delay: 0.10s; }
    .card-light:nth-child(3) { animation-delay: 0.15s; }

    .card-light::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(120deg, transparent 0%, rgba(0,0,0,0.04) 50%, transparent 100%);
      transition: left 0.5s ease;
      pointer-events: none;
    }

    .card-light:hover::before { left: 160%; }

    .card-light::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 24px;
      background: linear-gradient(135deg, #00c6ff, #7b2fff, #0072ff);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .card-light:hover::after { opacity: 1; }

    .card-light:hover {
      transform: translateY(-12px) scale(1.04);
      box-shadow: 0 24px 50px rgba(0, 114, 255, 0.2), 0 0 0 1px rgba(0,198,255,0.2);
      border-color: transparent;
    }

    .card-light a {
      text-decoration: none;
      color: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card-light a img {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin-bottom: 16px;
      border: 2px solid rgba(0, 114, 255, 0.25);
      box-shadow: 0 0 0 4px rgba(0, 114, 255, 0.06), 0 0 20px rgba(0, 114, 255, 0.15);
      object-fit: cover;
      transition: box-shadow 0.35s ease, transform 0.35s ease;
    }

    .card-light:hover a img {
      box-shadow: 0 0 0 5px rgba(0,198,255,0.2), 0 0 35px rgba(0,198,255,0.5);
      transform: scale(1.1);
    }

    .card-light a span {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      color: #1a1a2e;
      transition: color 0.2s;
    }

    .card-light:hover a span { color: #0072ff; }

    .card-light a .card-desc {
      font-size: 0.7rem;
      font-weight: 400;
      color: #6b6b8a;
      margin-top: 6px;
      text-align: center;
      line-height: 1.4;
    }

    @media (max-width: 1200px) {
      .grid-light { grid-template-columns: repeat(5, 1fr); }
    }
    @media (max-width: 900px) {
      .grid-light { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 600px) {
      .grid-light { grid-template-columns: repeat(2, 1fr); padding: 0 24px 24px; }
    }
    @media (max-width: 380px) {
      .grid-light { grid-template-columns: 1fr; }
    }
  </style>
